name: Deploy Convocation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
     - name: Deploy via SSH
  run: |
    mkdir -p ~/.ssh
    echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
    chmod 600 ~/.ssh/id_rsa

    ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    ssh -tt -o StrictHostKeyChecking=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
      set -e

      cd /home/ubuntu/convocation-spa/BPHC-Convocation

      echo "🔄 Pull latest code"
      git pull origin main

      echo "🧹 FULL cleanup"
      rm -rf node_modules build package-lock.json

      echo "🌐 Fix npm registry"
      npm config set registry https://registry.npmjs.org/

      echo "🧼 Clear cache"
      npm cache clean --force

      echo "📦 Install fresh dependencies"
      npm install --no-audit --no-fund

      echo "🏗️ Build project"
      npm run build

      echo "🔁 Reload nginx"
      sudo systemctl reload nginx || true

      echo "✅ Deployment completed"
    EOF